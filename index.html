<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Drive PAI HST - Premium Design</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            background-color: #020617;
        }

        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://images.unsplash.com/photo-1519817650390-64a93db51149?q=80&w=2000&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            opacity: 0.4;
            z-index: -1;
            transition: opacity 0.8s ease, background-image 0.8s ease;
        }

        /* Tombol Ganti Latar yang lebih kecil & ramping */
        .btn-action {
            background: #ffffff;
            color: #000000;
            border-radius: 8px;
            padding: 8px 16px;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            transition: all 0.3s ease;
            border: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Efek cahaya saat hover */
        .clickable-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(34, 197, 94, 0.1), transparent);
            transition: 0.5s;
        }

        .clickable-card:hover::before {
            left: 100%;
        }

        .clickable-card:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: rgba(34, 197, 94, 0.5);
            background: linear-gradient(135deg, rgba(34, 197, 94, 0.1) 0%, rgba(255, 255, 255, 0.05) 100%);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 0 0 20px rgba(34, 197, 94, 0.1);
        }

        .card-pattern {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.05;
            background-image: radial-gradient(#fff 0.5px, transparent 0.5px);
            background-size: 10px 10px;
            pointer-events: none;
        }

        .text-glow {
            text-shadow: 0 0 15px rgba(34, 197, 94, 0.4);
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .reveal {
            animation: fadeInUp 0.6s ease forwards;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.1);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(34, 197, 94, 0.3);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(34, 197, 94, 0.5);
        }
    </style>
</head>
<body>

    <div id="bgOverlay" class="bg-overlay"></div>

    <div class="relative z-10 flex flex-col min-h-screen">
        
        <!-- Header -->
        <header class="p-8">
            <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-6">
                <div class="flex items-center space-x-5">
                    <div class="w-14 h-14 rounded-2xl bg-gradient-to-br from-green-500 to-emerald-700 p-[1px] shadow-lg shadow-green-500/20">
                        <div class="w-full h-full bg-slate-900 rounded-2xl flex items-center justify-center">
                            <i class="fas fa-kaaba text-green-400 text-xl"></i>
                        </div>
                    </div>
                    <div>
                        <h1 class="text-white text-2xl font-black tracking-tighter italic">PAI HST <span class="text-green-500">CLOUD</span></h1>
                        <p class="text-green-500/60 text-[10px] font-bold uppercase tracking-[0.4em]">Digital Management System</p>
                    </div>
                </div>

                <div class="flex items-center">
                    <label for="bgInput" class="group relative px-6 py-2.5 bg-white/5 hover:bg-white/10 text-white text-[11px] tracking-widest font-extrabold rounded-xl cursor-pointer transition-all border border-white/10 overflow-hidden">
                        <span class="relative z-10 flex items-center">
                            <i class="fas fa-palette mr-2 group-hover:rotate-12 transition"></i> GANTI BACKGROUND
                        </span>
                    </label>
                    <input type="file" id="bgInput" accept="image/*" class="hidden" onchange="handleBgChange(event)">
                </div>
            </div>
        </header>

        <!-- Hero -->
        <section class="max-w-5xl mx-auto text-center pt-16 pb-20 px-6 reveal">
            <div class="inline-flex items-center space-x-2 bg-green-500/10 border border-green-500/20 px-4 py-1.5 rounded-full mb-6">
                <span class="relative flex h-2 w-2">
                  <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                  <span class="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span>
                </span>
                <span class="text-green-400 text-[10px] font-bold tracking-widest uppercase">Pusat Data Terpadu</span>
            </div>
            <h2 class="text-5xl md:text-7xl font-black text-white mb-6 tracking-tighter leading-[1.1]">
                Akses Berkas <br><span class="text-transparent bg-clip-text bg-gradient-to-r from-green-400 to-emerald-200">KKG & MGMP</span>
            </h2>
            <p class="text-white/50 text-base md:text-lg font-medium max-w-2xl mx-auto leading-relaxed">
                Platform satu pintu untuk koordinasi arsip digital Pendidikan Agama Islam Kabupaten Hulu Sungai Tengah.
            </p>
        </section>

        <!-- Unit Grid -->
        <main class="max-w-7xl mx-auto px-6 pb-24 flex-grow w-full">
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                <script>
                    const units = [
                        { name: "KKG PAI Kec. Barabai", link: "https://drive.google.com/drive/folders/1tar57v_P5ysUldzCDz8U4PxbeZKBylxx?usp=sharing", icon: "fa-building-columns" },
                        { name: "KKG PAI Kec. Pandawan", link: "https://drive.google.com/drive/folders/15ye6xpRMkgIk4oFYLoc8QtdNj-ehWQnG?usp=drive_link", icon: "fa-mosque" },
                        { name: "KKG PAI Kec. Batu Benawa", link: "https://drive.google.com/drive/folders/1gKDVbSSevE0rZPPGlHQ0AebIDwmEjvTF?usp=drive_link", icon: "fa-mountain-sun" },
                        { name: "KKG PAI Kec. LAU", link: "https://drive.google.com/drive/folders/1CXlgdqtv70lCyeX93onWo6y5SGuvXjTG?usp=drive_link", icon: "fa-landmark" },
                        { name: "KKG PAI Kec. LAS", link: "https://drive.google.com/drive/folders/1XFxFmqjyYJKGqHsU2LJNyAGqr7B7vEEw?usp=drive_link", icon: "fa-building-flag" },
                        { name: "KKG PAI Kec. Haruyan", link: "https://drive.google.com/drive/folders/1yxvRkLKxLV2KpBoUmf8QexiFhSrhGLWI?usp=drive_link", icon: "fa-school" },
                        { name: "KKG PAI Kec. Hantakan", link: "https://drive.google.com/drive/folders/1hS-AQwR1Wd0rjJFoyxKM-ALJaHxD-kv7?usp=drive_link", icon: "fa-tree" },
                        { name: "KKG PAI Kec. BAS & BAT", link: "https://drive.google.com/drive/folders/1Uc_fjl7p1wZPS-ZrSPbJWpNB-hnon81l?usp=sharing", icon: "fa-map-location-dot" },
                        { name: "KKG PAI Kec. Limpasu", link: "https://drive.google.com/drive/folders/12i_n59wA-TTMzot5UDh9S69pTRtJyQoU?usp=drive_link", icon: "fa-dharmachakra" },
                        { name: "KKG PAI Kec. BATARA", link: "https://drive.google.com/drive/folders/1FcpWyM7zgkZT3J0AC5pcKd-P9QpGuDJi?usp=sharing", icon: "fa-hands-holding-child" },
                        { name: "MGMP PAI SMP HST", link: "https://drive.google.com/drive/folders/1YLPNbB8iArXJrFtsyAoAF2YEZTfBJJoP?usp=sharing", icon: "fa-award" },
                        { name: "MGMP PAI SMA & SMK HST", link: "https://drive.google.com/drive/folders/1BJVFDQV0H-jvpTsESIKh5-a_uUsh_e84?usp=sharing", icon: "fa-graduation-cap" }
                    ];

                    document.write(units.map((unit, i) => `
                        <a href="${unit.link}" target="_blank" class="clickable-card rounded-[2rem] p-10 h-60 reveal group" style="animation-delay: ${i * 0.05}s">
                            <div class="card-pattern"></div>
                            
                            <!-- Icon & Accent -->
                            <div class="w-16 h-16 rounded-2xl bg-white/5 flex items-center justify-center mb-6 group-hover:bg-green-500/20 transition-all border border-white/10 group-hover:border-green-500/30">
                                <i class="fas ${unit.icon} text-2xl text-white/40 group-hover:text-green-400 group-hover:scale-110 transition-all"></i>
                            </div>

                            <!-- Title -->
                            <div class="flex flex-col items-center text-center">
                                <span class="text-white font-extrabold text-base md:text-lg tracking-tight group-hover:text-green-300 transition-colors">
                                    ${unit.name}
                                </span>
                                <div class="h-1 w-0 bg-green-500 rounded-full mt-4 group-hover:w-12 transition-all duration-500"></div>
                            </div>

                            <!-- Small indicator -->
                            <div class="absolute bottom-6 right-8 opacity-0 group-hover:opacity-100 transition-opacity">
                                <i class="fas fa-arrow-right text-green-400 text-xs"></i>
                            </div>
                        </a>
                    `).join(''));
                </script>
            </div>
        </main>

        <!-- Footer -->
        <footer class="py-12 px-6 border-t border-white/5">
            <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-6">
                <p class="text-white/20 text-[10px] font-bold uppercase tracking-[0.4em]">&copy; 2026 AGPAII HULU SUNGAI TENGAH</p>
                <div class="flex space-x-6">
                   <a href="#" class="text-white/30 hover:text-green-400 text-lg transition"><i class="fab fa-instagram"></i></a>
                   <a href="#" class="text-white/30 hover:text-green-400 text-lg transition"><i class="fab fa-facebook"></i></a>
                   <a href="#" class="text-white/30 hover:text-green-400 text-lg transition"><i class="fab fa-whatsapp"></i></a>
                </div>
            </div>
        </footer>

    </div>

    <script>
        function handleBgChange(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const bgOverlay = document.getElementById('bgOverlay');
                    bgOverlay.style.backgroundImage = `url('${e.target.result}')`;
                    
                    const toast = document.createElement('div');
                    toast.className = 'fixed bottom-10 left-1/2 transform -translate-x-1/2 bg-green-500 text-white px-10 py-4 rounded-2xl font-black text-[11px] z-[100] shadow-2xl shadow-green-500/40 tracking-[0.2em] uppercase';
                    toast.innerText = 'Visual Berhasil Diperbarui';
                    document.body.appendChild(toast);
                    setTimeout(() => {
                        toast.style.opacity = '0';
                        toast.style.transition = '0.5s';
                        setTimeout(() => toast.remove(), 500);
                    }, 2500);
                };
                reader.readAsDataURL(file);
            }
        }
    </script>
</body>
</html>
