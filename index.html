<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Drive PAI HST - Premium Design</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            background-color: #020617;
        }

        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://images.unsplash.com/photo-1519817650390-64a93db51149?q=80&w=2000&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            opacity: 0.4;
            z-index: -1;
            transition: opacity 0.8s ease, background-image 0.8s ease;
        }

        .clickable-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            position: relative;
            overflow: hidden;
            transition: all 0.5s cubic-bezier(0.2, 1, 0.2, 1);
            display: flex;
            align-items: center;
            padding: 1.25rem 1.5rem;
            gap: 1.25rem;
            text-decoration: none;
            border-radius: 1.25rem;
        }

        .clickable-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(600px circle at var(--mouse-x, 50%) var(--mouse-y, 50%), rgba(34, 197, 94, 0.15), transparent 40%);
            opacity: 0;
            transition: opacity 0.5s;
        }

        .clickable-card:hover::before { opacity: 1; }

        .clickable-card:hover {
            transform: translateY(-5px) scale(1.02);
            border-color: rgba(34, 197, 94, 0.4);
            background: rgba(34, 197, 94, 0.05);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), inset 0 0 20px rgba(34, 197, 94, 0.05);
        }

        .icon-container {
            width: 46px;
            height: 46px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            flex-shrink: 0;
            position: relative;
            z-index: 2;
        }

        .clickable-card:hover .icon-container {
            transform: rotateY(180deg);
            background: #22c55e;
            border-color: #4ade80;
            box-shadow: 0 0 15px rgba(34, 197, 94, 0.5);
        }

        .clickable-card:hover .icon-container i {
            color: #020617;
            transform: rotateY(180deg);
        }

        .card-pattern {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.03;
            background-image: radial-gradient(#fff 0.5px, transparent 0.5px);
            background-size: 10px 10px;
            pointer-events: none;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .reveal { animation: fadeInUp 0.6s ease forwards; }
        .text-solid-green { color: #22c55e; }
    </style>
</head>
<body>

    <div id="bgOverlay" class="bg-overlay"></div>

    <div class="relative z-10 flex flex-col min-h-screen">
        
        <!-- Header -->
        <header class="p-8">
            <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-6">
                <div class="flex items-center space-x-5">
                    <div class="w-14 h-14 rounded-2xl bg-gradient-to-br from-green-500 to-emerald-700 p-[1px] shadow-lg shadow-green-500/20">
                        <div class="w-full h-full bg-slate-900 rounded-2xl flex items-center justify-center">
                            <i class="fas fa-kaaba text-green-400 text-xl"></i>
                        </div>
                    </div>
                    <div>
                        <h1 class="text-white text-2xl font-black tracking-tighter italic">PAI HST <span class="text-green-500">CLOUD</span></h1>
                        <p class="text-green-500/60 text-[10px] font-bold uppercase tracking-[0.4em]">Digital Management System</p>
                    </div>
                </div>

                <div class="flex items-center">
                    <label for="bgInput" class="group relative px-6 py-2.5 bg-white/5 hover:bg-white/10 text-white text-[11px] tracking-widest font-extrabold rounded-xl cursor-pointer transition-all border border-white/10 overflow-hidden">
                        <span class="relative z-10 flex items-center">
                            <i class="fas fa-palette mr-2 group-hover:rotate-12 transition"></i> GANTI BACKGROUND
                        </span>
                    </label>
                    <input type="file" id="bgInput" accept="image/*" class="hidden" onchange="handleBgChange(event)">
                </div>
            </div>
        </header>

        <!-- Hero Section -->
        <section class="max-w-5xl mx-auto text-center pt-12 pb-16 px-6 reveal">
            <div class="inline-flex items-center space-x-2 bg-green-500/10 border border-green-500/20 px-4 py-1.5 rounded-full mb-6">
                <span class="relative flex h-2 w-2">
                  <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                  <span class="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span>
                </span>
                <span class="text-green-400 text-[10px] font-bold tracking-widest uppercase">Pusat Data Terpadu</span>
            </div>
            <h2 class="text-5xl md:text-6xl font-black text-white mb-6 tracking-tighter leading-tight">
                Akses Berkas <br><span class="text-solid-green">KKG & MGMP</span>
            </h2>
            <p class="text-white/50 text-base font-medium max-w-2xl mx-auto leading-relaxed">
                Platform satu pintu untuk koordinasi arsip digital Pendidikan Agama Islam Kabupaten Hulu Sungai Tengah.
            </p>
        </section>

        <!-- Unit Grid -->
        <main class="max-w-7xl mx-auto px-6 pb-24 flex-grow w-full">
            <div id="unitContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                <!-- Kotak akan otomatis muncul di sini via JavaScript di bawah -->
            </div>
        </main>

        <!-- Footer -->
        <footer class="py-12 px-6 border-t border-white/5">
            <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-6">
                <p class="text-white/20 text-[10px] font-bold uppercase tracking-[0.4em]">&copy; 2026 AGPAII HULU SUNGAI TENGAH</p>
                <div class="flex space-x-6">
                   <a href="#" class="text-white/30 hover:text-green-400 text-lg transition"><i class="fab fa-instagram"></i></a>
                   <a href="#" class="text-white/30 hover:text-green-400 text-lg transition"><i class="fab fa-facebook"></i></a>
                   <a href="#" class="text-white/30 hover:text-green-400 text-lg transition"><i class="fab fa-whatsapp"></i></a>
                </div>
            </div>
        </footer>
    </div>

    <script>
        /** * CARA MENAMBAH KOTAK BARU:
         * 1. Cari daftar "units" di bawah ini.
         * 2. Tambahkan baris baru di dalam kurung siku [ ... ]
         * 3. Formatnya: { name: "Nama Kegiatan", link: "Link Google Drive", icon: "Ikon FontAwesome" },
         * 4. Pastikan ada tanda koma (,) di akhir baris sebelumnya.
         */
        const units = [
            { name: "KKG PAI Kec. Barabai", link: "https://drive.google.com/drive/folders/1tar57v_P5ysUldzCDz8U4PxbeZKBylxx?usp=sharing", icon: "fa-mosque" },
            { name: "KKG PAI Kec. Pandawan", link: "https://drive.google.com/drive/folders/15ye6xpRMkgIk4oFYLoc8QtdNj-ehWQnG?usp=drive_link", icon: "fa-kaaba" },
            { name: "KKG PAI Kec. Batu Benawa", link: "https://drive.google.com/drive/folders/1gKDVbSSevE0rZPPGlHQ0AebIDwmEjvTF?usp=drive_link", icon: "fa-mountain-sun" },
            { name: "KKG PAI Kec. LAU", link: "https://drive.google.com/drive/folders/1CXlgdqtv70lCyeX93onWo6y5SGuvXjTG?usp=drive_link", icon: "fa-landmark" },
            { name: "KKG PAI Kec. LAS", link: "https://drive.google.com/drive/folders/1XFxFmqjyYJKGqHsU2LJNyAGqr7B7vEEw?usp=drive_link", icon: "fa-building-flag" },
            { name: "KKG PAI Kec. Haruyan", link: "https://drive.google.com/drive/folders/1yxvRkLKxLV2KpBoUmf8QexiFhSrhGLWI?usp=drive_link", icon: "fa-school" },
            { name: "KKG PAI Kec. Hantakan", link: "https://drive.google.com/drive/folders/1hS-AQwR1Wd0rjJFoyxKM-ALJaHxD-kv7?usp=drive_link", icon: "fa-tree" },
            { name: "KKG PAI Kec. BAS & BAT", link: "https://drive.google.com/drive/folders/1Uc_fjl7p1wZPS-ZrSPbJWpNB-hnon81l?usp=sharing", icon: "fa-map-location-dot" },
            { name: "KKG PAI Kec. Limpasu", link: "https://drive.google.com/drive/folders/12i_n59wA-TTMzot5UDh9S69pTRtJyQoU?usp=drive_link", icon: "fa-dharmachakra" },
            { name: "KKG PAI Kec. BATARA", link: "https://drive.google.com/drive/folders/1FcpWyM7zgkZT3J0AC5pcKd-P9QpGuDJi?usp=sharing", icon: "fa-hands-holding-child" },
            { name: "MGMP PAI SMP HST", link: "https://drive.google.com/drive/folders/1YLPNbB8iArXJrFtsyAoAF2YEZTfBJJoP?usp=sharing", icon: "fa-award" },
            { name: "MGMP PAI SMA & SMK HST", link: "https://drive.google.com/drive/folders/1BJVFDQV0H-jvpTsESIKh5-a_uUsh_e84?usp=sharing", icon: "fa-graduation-cap" },
            { name: "Dokumentasi Bukber AGPAII 2026", link: "https://drive.google.com/drive/folders/1apiQtTGQ80OMHawO6BZIsEpbCtUXoGzc", icon: "fa-people" },
            
            // CONTOH CARA TAMBAH BARU (Hapus tanda // di depan jika ingin mengaktifkan):
            // { name: "KEGIATAN BARU ANDA", link: "https://google.com", icon: "fa-star" },
        ];

        // Script untuk merender kotak secara otomatis
        const container = document.getElementById('unitContainer');
        container.innerHTML = units.map((unit, i) => `
            <a href="${unit.link}" target="_blank" class="clickable-card reveal group" onmousemove="handleCardMove(event, this)" style="animation-delay: ${i * 0.05}s">
                <div class="card-pattern"></div>
                <div class="icon-container">
                    <i class="fas ${unit.icon} text-lg text-white/40 group-hover:text-slate-900 transition-all"></i>
                </div>
                <div class="flex flex-col relative z-10">
                    <span class="text-white font-bold text-sm tracking-tight group-hover:text-green-400 transition-colors uppercase">
                        ${unit.name}
                    </span>
                    <span class="text-[9px] font-black text-white/20 uppercase tracking-[0.2em] mt-0.5 group-hover:text-green-500/50 transition-colors">Akses Cloud</span>
                </div>
                <i class="fas fa-arrow-right ml-auto text-[10px] text-white/10 group-hover:text-green-400 group-hover:translate-x-1 transition-all"></i>
            </a>
        `).join('');

        function handleCardMove(e, card) {
            const rect = card.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            card.style.setProperty('--mouse-x', `${x}px`);
            card.style.setProperty('--mouse-y', `${y}px`);
        }

        function handleBgChange(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('bgOverlay').style.backgroundImage = `url('${e.target.result}')`;
                };
                reader.readAsDataURL(file);
            }
        }
    </script>
</body>
</html>
